<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behoof — Каталог телефонов</title>
</head>
<body>
    <div class="catalog-page">
        <!-- Шапка каталога -->
        <div class="catalog-header">
            <h1>📱 Каталог смартфонов</h1>
            <p>Выберите идеальный телефон среди сотни моделей</p>
        </div>
        
        <!-- Секция фильтров -->
        <div class="filter-section">
            <h3>Фильтры</h3>
            <div class="filter-grid">
                <button class="filter-chip active" data-filter="all">Все</button>
                <button class="filter-chip" data-filter="apple">Apple iPhone</button>
                <button class="filter-chip" data-filter="samsung">Samsung Galaxy</button>
                <button class="filter-chip" data-filter="google">Google Pixel</button>
                <button class="filter-chip" data-filter="xiaomi">Xiaomi</button>
                <button class="filter-chip" data-filter="budget">До 50 000 ₽</button>
                <button class="filter-chip" data-filter="flagship">Флагманы</button>
            </div>
        </div>
        
        <!-- Сетка товаров -->
        <div class="products-grid" id="productsGrid">
            <!-- Товары загружаются через JavaScript -->
        </div>
        
        <!-- Пагинация -->
        <div class="pagination" id="pagination">
            <!-- Кнопки пагинации загружаются через JavaScript -->
        </div>
    </div>
    
    <script>
        // База данных телефонов
        const phonesDatabase = [
            { id: 1, name: "iPhone 15 Pro Max", brand: "apple", price: 144990, old_price: 159990, rating: 4.8, category: "flagship", image: "", description: "Титановый корпус, чип A17 Pro, 5 камер", is_new: true, is_hot: true },
            { id: 2, name: "iPhone 15 Pro", brand: "apple", price: 119990, old_price: 129990, rating: 4.7, category: "flagship", image: "", description: "Лёгкий, мощный, профессиональная камера", is_new: true, is_hot: false },
            { id: 3, name: "iPhone 15 Plus", brand: "apple", price: 99990, old_price: 109990, rating: 4.6, category: "flagship", image: "", description: "Большой экран, отличная автономность", is_new: true, is_hot: false },
            { id: 4, name: "iPhone 15", brand: "apple", price: 79990, old_price: 89990, rating: 4.5, category: "flagship", image: "", description: "Динамический остров, USB-C", is_new: true, is_hot: false },
            { id: 5, name: "Samsung Galaxy S24 Ultra", brand: "samsung", price: 139990, old_price: 159990, rating: 4.9, category: "flagship", image: "", description: "S-Pen, 200MP камера, AI функции", is_new: true, is_hot: true },
            { id: 6, name: "Samsung Galaxy S24+", brand: "samsung", price: 109990, old_price: 124990, rating: 4.7, category: "flagship", image: "", description: "Большой дисплей, мощный процессор", is_new: true, is_hot: false },
            { id: 7, name: "Samsung Galaxy S24", brand: "samsung", price: 89990, old_price: 99990, rating: 4.6, category: "flagship", image: "", description: "Компактный флагман", is_new: true, is_hot: false },
            { id: 8, name: "Samsung Galaxy A54", brand: "samsung", price: 34990, old_price: 39990, rating: 4.4, category: "budget", image: "", description: "Лучший среднебюджетник", is_new: false, is_hot: false },
            { id: 9, name: "Google Pixel 8 Pro", brand: "google", price: 99990, old_price: 114990, rating: 4.8, category: "flagship", image: "", description: "Лучшая камера, чистый Android", is_new: true, is_hot: true },
            { id: 10, name: "Google Pixel 8", brand: "google", price: 69990, old_price: 79990, rating: 4.6, category: "flagship", image: "", description: "Компактный, мощный", is_new: true, is_hot: false },
            { id: 11, name: "Google Pixel 7a", brand: "google", price: 44990, old_price: 49990, rating: 4.5, category: "budget", image: "", description: "Отличный бюджетный вариант", is_new: false, is_hot: false },
            { id: 12, name: "Xiaomi 13T Pro", brand: "xiaomi", price: 59990, old_price: 69990, rating: 4.6, category: "budget", image: "", description: "120W зарядка, 144Hz экран", is_new: false, is_hot: true },
            { id: 13, name: "Xiaomi 13 Ultra", brand: "xiaomi", price: 89990, old_price: 99990, rating: 4.7, category: "flagship", image: "", description: "Leica камера", is_new: false, is_hot: false },
            { id: 14, name: "Xiaomi Poco F5", brand: "xiaomi", price: 34990, old_price: 39990, rating: 4.4, category: "budget", image: "", description: "Лучший игровой бюджетник", is_new: false, is_hot: false }
        ];
        
        let currentFilter = "all";
        let currentPage = 1;
        const itemsPerPage = 8;
        let likedPhones = JSON.parse(localStorage.getItem('behoof_liked_phones')) || {};
        
        // Сохранение лайков
        function saveLikes() {
            localStorage.setItem('behoof_liked_phones', JSON.stringify(likedPhones));
        }
        
        function toggleLike(phoneId) {
            if (likedPhones[phoneId]) {
                delete likedPhones[phoneId];
            } else {
                likedPhones[phoneId] = true;
            }
            saveLikes();
            renderProducts();
        }
        
        function isLiked(phoneId) {
            return likedPhones[phoneId] === true;
        }
        
        // Фильтрация товаров
        function getFilteredProducts() {
            let filtered = [...phonesDatabase];
            
            switch(currentFilter) {
                case "apple":
                    filtered = filtered.filter(p => p.brand === "apple");
                    break;
                case "samsung":
                    filtered = filtered.filter(p => p.brand === "samsung");
                    break;
                case "google":
                    filtered = filtered.filter(p => p.brand === "google");
                    break;
                case "xiaomi":
                    filtered = filtered.filter(p => p.brand === "xiaomi");
                    break;
                case "budget":
                    filtered = filtered.filter(p => p.price <= 50000);
                    break;
                case "flagship":
                    filtered = filtered.filter(p => p.category === "flagship");
                    break;
                default:
                    break;
            }
            
            return filtered;
        }
        
        // Пагинация
        function getPaginatedProducts(products) {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            return products.slice(start, end);
        }
        
        function getTotalPages(products) {
            return Math.ceil(products.length / itemsPerPage);
        }
        
        // Отображение товаров
        function renderProducts() {
            const filtered = getFilteredProducts();
            const totalPages = getTotalPages(filtered);
            const paginatedProducts = getPaginatedProducts(filtered);
            const container = document.getElementById('productsGrid');
            
            if (paginatedProducts.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 60px;">🔍 Товары не найдены</div>';
                return;
            }
            
            container.innerHTML = paginatedProducts.map(phone => `
                <div class="product-item">
                    <div class="product-image">
                        <img src="${phone.image || 'https://placehold.co/400x240?text=' + phone.name}" 
                             alt="${phone.name}"
                             onerror="this.src='https://placehold.co/400x240?text=📱'">
                        ${phone.is_new ? '<div class="product-badge new">NEW</div>' : ''}
                        ${phone.is_hot ? '<div class="product-badge hot">HOT</div>' : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${phone.brand.toUpperCase()} • ${phone.category === 'flagship' ? 'Флагман' : 'Средний класс'}</div>
                        <div class="product-name">${phone.name}</div>
                        <div class="product-price">
                            ${phone.price.toLocaleString('ru-RU')} ₽
                            ${phone.old_price ? `<span class="product-old-price">${phone.old_price.toLocaleString('ru-RU')} ₽</span>` : ''}
                        </div>
                        <div class="product-rating">
                            <div class="stars">${'★'.repeat(Math.floor(phone.rating))}${'☆'.repeat(5 - Math.floor(phone.rating))}</div>
                            <span>${phone.rating}</span>
                        </div>
                        <div class="product-actions">
                            <button class="btn-like ${isLiked(phone.id) ? 'active' : ''}" data-id="${phone.id}">
                                ${isLiked(phone.id) ? '❤️ В избранном' : '🤍 В избранное'}
                            </button>
                            <button class="btn-compare" data-id="${phone.id}">
                                📊 Сравнить
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Привязываем обработчики
            document.querySelectorAll('.btn-like').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    toggleLike(id);
                });
            });
            
            document.querySelectorAll('.btn-compare').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    alert('📊 Товар добавлен в сравнение');
                });
            });
            
            renderPagination(totalPages);
        }
        
        function renderPagination(totalPages) {
            const paginationContainer = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationContainer.style.display = 'none';
                return;
            }
            
            paginationContainer.style.display = 'flex';
            let buttons = '';
            
            for (let i = 1; i <= totalPages; i++) {
                buttons += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            
            paginationContainer.innerHTML = buttons;
            
            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentPage = parseInt(btn.dataset.page);
                    renderProducts();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
        }
        
        // Фильтры
        function initFilters() {
            const filters = document.querySelectorAll('.filter-chip');
            filters.forEach(filter => {
                filter.addEventListener('click', () => {
                    filters.forEach(f => f.classList.remove('active'));
                    filter.classList.add('active');
                    currentFilter = filter.dataset.filter;
                    currentPage = 1;
                    renderProducts();
                });
            });
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            initFilters();
        });
    </script>
</body>
</html>
