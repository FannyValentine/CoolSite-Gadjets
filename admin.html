<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behoof — Админ-панель</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        .admin-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .admin-header { background: linear-gradient(135deg, #FF4D4D 0%, #FF6B6B 100%); border-radius: 24px; padding: 40px; margin-bottom: 40px; text-align: center; color: white; }
        .product-form { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border: 1px solid #F2F5F9; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #0F1113; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1px solid #E1E5EB; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #FF4D4D; box-shadow: 0 0 0 3px rgba(255,77,77,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-submit { background: #FF4D4D; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-submit:hover { background: #e04343; transform: translateY(-2px); }
        .image-preview { width: 150px; height: 150px; border: 2px dashed #E1E5EB; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-top: 12px; overflow: hidden; background: #F6F7FA; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .success-message { background: #30D170; color: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .success-message.show { display: block; animation: fadeIn 0.3s ease; }
        .error-message { background: #FF4D4D; color: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .error-message.show { display: block; animation: fadeIn 0.3s ease; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #FF4D4D; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        .warning-note { background: #FFF3CD; border: 1px solid #FFEAA7; border-radius: 12px; padding: 16px; margin-bottom: 24px; color: #856404; font-size: 14px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 10px; }
        .status-connected { background: #30D170; color: white; }
        .status-error { background: #FF4D4D; color: white; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="index.html" class="back-link">← На главную</a>
        
        <div class="admin-header">
            <h1>➕ Добавление товара</h1>
            <p>Данные сохраняются в облачной базе Supabase</p>
        </div>
        
        <div class="warning-note">
            ⚠️ <strong>Постоянное хранение:</strong> Товары сохраняются в Supabase и не пропадают при очистке кэша!
        </div>
        
        <div id="successMessage" class="success-message">✅ Товар успешно добавлен в базу данных!</div>
        <div id="errorMessage" class="error-message">❌ Ошибка при добавлении товара</div>
        
        <div class="product-form">
            <form id="productForm">
                <div class="form-group">
                    <label>Название товара *</label>
                    <input type="text" id="productName" required placeholder="iPhone 15 Pro Max 256GB">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Цена (₽) *</label>
                        <input type="number" id="productPrice" required placeholder="144990">
                    </div>
                    <div class="form-group">
                        <label>Старая цена (₽)</label>
                        <input type="number" id="productOldPrice" placeholder="159990">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Категория *</label>
                    <select id="productCategory">
                        <option value="Смартфоны">📱 Смартфоны</option>
                        <option value="Ноутбуки">💻 Ноутбуки</option>
                        <option value="Наушники">🎧 Наушники</option>
                        <option value="Телевизоры">📺 Телевизоры</option>
                        <option value="Умные часы">⌚ Умные часы</option>
                        <option value="Планшеты">📱 Планшеты</option>
                        <option value="Аксессуары">🔌 Аксессуары</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label><input type="checkbox" id="productIsNew"> Новинка</label>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="productIsPopular"> Популярный</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>URL изображения *</label>
                    <input type="url" id="productImage" placeholder="https://images.unsplash.com/photo-...">
                    <div class="image-preview" id="imagePreview">
                        <span style="color: #A1ABB9;">Предпросмотр</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Описание товара</label>
                    <textarea id="productDescription" rows="3" placeholder="Краткое описание товара..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Характеристики</label>
                    <input type="text" id="productSpecs" placeholder="Процессор: A17 Pro, ОЗУ: 8GB">
                </div>
                
                <button type="submit" class="btn-submit">💾 Сохранить в Supabase</button>
            </form>
        </div>
    </div>
    
    <script type="module">
        import { supabase, TABLES, addProduct, checkConnection } from './supabase-config.js'
        
        function showMessage(type, text) {
            const successMsg = document.getElementById('successMessage')
            const errorMsg = document.getElementById('errorMessage')
            
            if (type === 'success') {
                successMsg.textContent = text || '✅ Товар успешно добавлен в базу данных!'
                successMsg.classList.add('show')
                setTimeout(() => successMsg.classList.remove('show'), 3000)
            } else {
                errorMsg.textContent = text || '❌ Ошибка при добавлении товара'
                errorMsg.classList.add('show')
                setTimeout(() => errorMsg.classList.remove('show'), 3000)
            }
        }
        
        function previewImage() {
            const url = document.getElementById('productImage').value
            const preview = document.getElementById('imagePreview')
            if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                preview.innerHTML = `<img src="${url}" alt="Предпросмотр" onerror="this.src='https://placehold.co/150x150?text=Ошибка'">`
            } else {
                preview.innerHTML = '<span style="color: #A1ABB9;">Предпросмотр</span>'
            }
        }
        
        document.getElementById('productImage').addEventListener('input', previewImage)
        
        // Проверка подключения при загрузке страницы
        async function testConnection() {
            try {
                const { data, error } = await supabase
                    .from(TABLES.PRODUCTS)
                    .select('count', { count: 'exact', head: true })
                
                if (error) {
                    console.error('Ошибка подключения:', error)
                    showMessage('error', '❌ Не удалось подключиться к Supabase. Проверьте настройки!')
                } else {
                    console.log('✅ Подключение к Supabase установлено')
                }
            } catch (err) {
                console.error('Ошибка:', err)
                showMessage('error', '❌ Ошибка подключения к Supabase: ' + err.message)
            }
        }
        
        testConnection()
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const productData = {
                name: document.getElementById('productName').value.trim(),
                price: parseInt(document.getElementById('productPrice').value),
                old_price: document.getElementById('productOldPrice').value ? parseInt(document.getElementById('productOldPrice').value) : null,
                category_name: document.getElementById('productCategory').value,
                is_new: document.getElementById('productIsNew').checked,
                is_popular: document.getElementById('productIsPopular').checked,
                image_url: document.getElementById('productImage').value.trim(),
                description: document.getElementById('productDescription').value.trim(),
                specs: document.getElementById('productSpecs').value.trim()
            }
            
            if (!productData.name) {
                showMessage('error', 'Введите название товара')
                return
            }
            if (!productData.price || productData.price <= 0) {
                showMessage('error', 'Введите корректную цену')
                return
            }
            if (!productData.image_url) {
                showMessage('error', 'Введите URL изображения')
                return
            }
            
            // Показываем индикатор загрузки
            const submitBtn = document.querySelector('.btn-submit')
            const originalText = submitBtn.textContent
            submitBtn.textContent = '⏳ Сохранение...'
            submitBtn.disabled = true
            
            try {
                const result = await addProduct(productData)
                
                if (result.success) {
                    showMessage('success', '✅ Товар успешно сохранён в Supabase!')
                    document.getElementById('productForm').reset()
                    document.getElementById('imagePreview').innerHTML = '<span style="color: #A1ABB9;">Предпросмотр</span>'
                    document.getElementById('productRating').value = '4.5'
                } else {
                    showMessage('error', '❌ Ошибка: ' + result.error)
                }
            } catch (error) {
                console.error('Ошибка:', error)
                showMessage('error', '❌ Ошибка при сохранении: ' + error.message)
            } finally {
                submitBtn.textContent = originalText
                submitBtn.disabled = false
            }
        })
    </script>
</body>
</html>
