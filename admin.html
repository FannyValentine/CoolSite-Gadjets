<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behoof — Админ-панель</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        .admin-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .admin-header { background: linear-gradient(135deg, #FF4D4D 0%, #FF6B6B 100%); border-radius: 24px; padding: 40px; margin-bottom: 40px; text-align: center; color: white; }
        .product-form { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1px solid #E1E5EB; border-radius: 12px; font-family: 'Inter', sans-serif; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-submit { background: #FF4D4D; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; }
        .image-preview { width: 150px; height: 150px; border: 2px dashed #E1E5EB; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-top: 12px; overflow: hidden; background: #F6F7FA; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .success-message { background: #30D170; color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .success-message.show { display: block; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #FF4D4D; text-decoration: none; }
        .warning-note { background: #FFF3CD; border-radius: 12px; padding: 16px; margin-bottom: 24px; color: #856404; font-size: 14px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="index.html" class="back-link">← На главную</a>
        
        <div class="admin-header">
            <h1>➕ Добавление товара</h1>
            <p>Данные сохраняются в Supabase</p>
        </div>
        
        <div class="warning-note">
            ⚠️ <strong>Постоянное хранение:</strong> Товары сохраняются в облачной базе данных Supabase<br>
            Данные не пропадут при очистке кэша или смене устройства!
        </div>
        
        <div id="successMessage" class="success-message">✅ Товар добавлен в базу данных!</div>
        
        <div class="product-form">
            <form id="productForm">
                <div class="form-group">
                    <label>Название товара *</label>
                    <input type="text" id="productName" required placeholder="iPhone 15 Pro Max">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Цена (₽) *</label>
                        <input type="number" id="productPrice" required placeholder="144990">
                    </div>
                    <div class="form-group">
                        <label>Старая цена (₽)</label>
                        <input type="number" id="productOldPrice" placeholder="159990">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Категория *</label>
                    <select id="productCategory">
                        <option value="Смартфоны">📱 Смартфоны</option>
                        <option value="Ноутбуки">💻 Ноутбуки</option>
                        <option value="Наушники">🎧 Наушники</option>
                        <option value="Телевизоры">📺 Телевизоры</option>
                        <option value="Умные часы">⌚ Умные часы</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label><input type="checkbox" id="productIsNew"> Новинка</label>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="productIsPopular"> Популярный</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>URL изображения *</label>
                    <input type="url" id="productImage" placeholder="https://images.unsplash.com/...">
                    <div class="image-preview" id="imagePreview">Предпросмотр</div>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="productDescription" rows="3" placeholder="Краткое описание товара..."></textarea>
                </div>
                
                <button type="submit" class="btn-submit">💾 Сохранить в Supabase</button>
            </form>
        </div>
    </div>
    
    <script type="module">
        import { supabase, TABLES, addProduct } from './supabase-config.js'
        
        function showMessage(text, isError = false) {
            const msg = document.getElementById('successMessage')
            msg.textContent = text
            msg.style.background = isError ? '#FF4D4D' : '#30D170'
            msg.classList.add('show')
            setTimeout(() => msg.classList.remove('show'), 3000)
        }
        
        function previewImage() {
            const url = document.getElementById('productImage').value
            const preview = document.getElementById('imagePreview')
            if (url && url.startsWith('http')) {
                preview.innerHTML = `<img src="${url}" onerror="this.src='https://placehold.co/150x150?text=Ошибка'">`
            } else {
                preview.innerHTML = 'Предпросмотр'
            }
        }
        
        document.getElementById('productImage').addEventListener('input', previewImage)
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const productData = {
                name: document.getElementById('productName').value,
                price: parseInt(document.getElementById('productPrice').value),
                old_price: document.getElementById('productOldPrice').value ? parseInt(document.getElementById('productOldPrice').value) : null,
                category_name: document.getElementById('productCategory').value,
                is_new: document.getElementById('productIsNew').checked,
                is_popular: document.getElementById('productIsPopular').checked,
                image_url: document.getElementById('productImage').value,
                description: document.getElementById('productDescription').value
            }
            
            if (!productData.name || !productData.price || !productData.image_url) {
                alert('Заполните обязательные поля!')
                return
            }
            
            try {
                const result = await addProduct(productData)
                
                if (result.success) {
                    showMessage('✅ Товар сохранён в Supabase! Обновите главную страницу.')
                    document.getElementById('productForm').reset()
                    document.getElementById('imagePreview').innerHTML = 'Предпросмотр'
                } else {
                    showMessage('❌ Ошибка: ' + result.error, true)
                }
            } catch (error) {
                showMessage('❌ Ошибка подключения к Supabase', true)
            }
        })
    </script>
</body>
</html>
